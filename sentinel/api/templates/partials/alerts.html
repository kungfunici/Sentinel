{% if alerts %}
<div class="space-y-2">
{% for ev in alerts %}
<div class="flex items-start gap-3 p-3 rounded-lg border
    {% if ev.severity == 'critical' %}bg-red-900/20 border-red-800/50
    {% elif ev.severity == 'warning' %}bg-yellow-900/20 border-yellow-800/50
    {% else %}bg-white/5 border-border{% endif %}">
    <span class="text-lg shrink-0">{% if ev.severity == 'critical' %}🚨{% elif ev.severity == 'warning' %}⚠️{% else %}ℹ️{% endif %}</span>
    <div class="min-w-0 flex-1">
        <div class="text-xs font-medium {% if ev.severity == 'critical' %}text-red-300{% elif ev.severity == 'warning' %}text-yellow-300{% else %}text-gray-300{% endif %}">
            {{ ev.type }}
        </div>
        <div class="text-xs text-gray-400 truncate mt-0.5">{{ ev.source }}</div>
    </div>
</div>
{% endfor %}
</div>
{% else %}
<div class="text-sm text-gray-600 py-4 text-center">No alerts — all clear ✓</div>
{% endif %}
