{% extends "base.html" %}
{% block content %}
<div class="p-4">
  <h1 class="text-lg font-semibold mb-4">Network Topology</h1>
  <div id="topology" style="height: 600px; border: 1px solid #2a2d3a; background: #1a1d27; border-radius: 12px;"></div>
  <div class="mt-4 text-sm text-gray-400 flex items-center gap-1">
    <span class="inline-block w-3 h-3 rounded-full bg-green-500 mr-1"></span> Normal
    <span class="inline-block w-3 h-3 rounded-full bg-red-500 ml-4 mr-1"></span> Flagged
    <span class="inline-block w-3 h-3 rounded-full bg-blue-500 ml-4 mr-1"></span> Gateway
    <span class="ml-4">Edges show observed connections</span>
  </div>
</div>

<script type="text/javascript" src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
<script>
async function loadTopology() {
  const res = await fetch('/api/topology');
  const data = await res.json();

  const nodes = data.devices.map(d => ({
    id: d.ip,
    label: d.hostname || d.ip,
    title: `IP: ${d.ip}\nMAC: ${d.mac || '-'}\nVendor: ${d.vendor || '-'}\nHostname: ${d.hostname || '-'}`,
    color: d.flagged ? '#ef4444' : (d.is_gateway ? '#3b82f6' : '#22c55e'),
    shape: d.is_gateway ? 'star' : 'dot',
    size: d.is_gateway ? 30 : 20,
  }));

  const edges = data.connections.map(c => ({
    from: c.src_ip,
    to: c.dst_ip,
    color: { color: '#6b7280', opacity: 0.4 },
    width: Math.min(c.count / 10, 5),
    title: `${c.count} packets`,
  }));

  const container = document.getElementById('topology');
  new vis.Network(container, { nodes, edges }, {
    physics: { solver: 'forceAtlas2Based', stabilization: { iterations: 100 } },
    edges: { smooth: { type: 'continuous' } },
  });
}
loadTopology();
</script>
{% endblock %}
