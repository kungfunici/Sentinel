<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel — {{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: '#0f1117',
                        panel:   '#1a1d27',
                        border:  '#2a2d3a',
                    }
                }
            }
        }
    </script>
    <style>
    body { background: #0f1117; }
    .badge-critical { background: rgba(127,29,29,0.5); color: #fca5a5; border: 1px solid rgba(185,28,28,0.5); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .badge-warning  { background: rgba(120,53,15,0.5); color: #fcd34d; border: 1px solid rgba(180,83,9,0.5);  border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .badge-info     { background: rgba(30,58,138,0.5); color: #93c5fd; border: 1px solid rgba(37,99,235,0.5); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .badge-ok       { background: rgba(20,83,45,0.5);  color: #86efac; border: 1px solid rgba(22,163,74,0.5); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .live-dot { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body class="text-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="border-b border-border bg-panel px-6 py-3 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
        <span class="text-lg font-semibold tracking-tight">⚡ Sentinel</span>
        <span class="text-xs px-2 py-0.5 rounded-full bg-green-900/50 text-green-400 border border-green-700/50 flex items-center gap-1">
            <span class="live-dot inline-block w-1.5 h-1.5 rounded-full bg-green-400"></span>
            live
        </span>
    </div>
    <div class="flex items-center gap-1 text-sm">
        <a href="/"        class="px-3 py-1.5 rounded-md hover:bg-white/5 {% if title == 'Dashboard' %}bg-white/10{% endif %} transition-colors">Dashboard</a>
        <a href="/devices" class="px-3 py-1.5 rounded-md hover:bg-white/5 {% if title == 'Devices' %}bg-white/10{% endif %} transition-colors">Devices</a>
        <a href="/events"  class="px-3 py-1.5 rounded-md hover:bg-white/5 {% if title == 'Events' %}bg-white/10{% endif %} transition-colors">Events</a>
        <a href="/dns"     class="px-3 py-1.5 rounded-md hover:bg-white/5 {% if title == 'DNS' %}bg-white/10{% endif %} transition-colors">DNS</a>
    </div>
    <div id="ws-status" class="text-xs text-gray-500">connecting...</div>
</nav>

<main class="px-6 py-6 max-w-7xl mx-auto">
    {% block content %}{% endblock %}
</main>

<!-- WebSocket live event handler -->
<script>
const wsStatus = document.getElementById('ws-status');
let ws, pingInterval;

function connectWS() {
    ws = new WebSocket(`ws://${location.host}/ws/events`);

    ws.onopen = () => {
        wsStatus.textContent = 'connected';
        wsStatus.className = 'text-xs text-green-400';
        pingInterval = setInterval(() => ws.readyState === 1 && ws.send('ping'), 20000);
    };

    ws.onclose = () => {
        wsStatus.textContent = 'reconnecting...';
        wsStatus.className = 'text-xs text-yellow-400';
        clearInterval(pingInterval);
        setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
        wsStatus.textContent = 'disconnected';
        wsStatus.className = 'text-xs text-red-400';
    };

    ws.onmessage = (e) => {
        const event = JSON.parse(e.data);
        handleLiveEvent(event);
    };
}

function handleLiveEvent(event) {
    // Refresh HTMX partials on notable events
    const notable = ['dns.blocked', 'arp.anomaly', 'device.new', 'port.scan_result'];
    if (notable.includes(event.type)) {
        htmx.trigger(document.body, 'sentinel:refresh');
    }

    // Show toast for critical/warning
    if (event.severity === 'critical' || event.severity === 'warning') {
        showToast(event);
    }
}

function showToast(event) {
    const container = document.getElementById('toast-container') || createToastContainer();
    const toast = document.createElement('div');
    const isCrit = event.severity === 'critical';
    const desc = event.data?.description || event.type;
    toast.className = `flex items-start gap-3 px-4 py-3 rounded-lg border text-sm shadow-xl transition-all duration-300 ${
        isCrit ? 'bg-red-900/90 border-red-700 text-red-100' : 'bg-yellow-900/90 border-yellow-700 text-yellow-100'
    }`;
    toast.innerHTML = `
        <span class="text-lg">${isCrit ? '🚨' : '⚠️'}</span>
        <div class="flex-1 min-w-0">
            <div class="font-medium">${event.severity.toUpperCase()}</div>
            <div class="text-xs opacity-80 truncate">${desc}</div>
        </div>
        <button onclick="this.parentElement.remove()" class="opacity-50 hover:opacity-100 ml-2">✕</button>
    `;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 8000);
}

function createToastContainer() {
    const div = document.createElement('div');
    div.id = 'toast-container';
    div.className = 'fixed bottom-4 right-4 z-50 flex flex-col gap-2 w-80';
    document.body.appendChild(div);
    return div;
}

connectWS();
</script>
</body>
</html>
